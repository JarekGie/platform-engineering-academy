name: secret-scan

# Skan sekretów na CAŁYM repo i pełnej historii dostępnej w checkout.
# Blocking (brak continue-on-error). Uruchamiany dla każdego pusha i PR.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (pełna historia — skan całej dostępnej historii)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2: dla repo publicznego nie wymaga licencji.
      # Wersja przypięta do stabilnego taga major (v2). Follow-up: pin do commit SHA.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
